<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <link rel="stylesheet" href="./style.css">
        <script src="./script.js" defer></script>
        <title>Sketchpad</title>
    </head>

    <body>
        <h1 class="title">Sketchpad</h1>
        <div class="content container">
            <div class="settings panel">
                <input type="color" id="colorpicker" value="#000000">
                <button class="mode" id="pen-mode">Pen Mode</button>
                <button class="mode" id="rainbow-mode">Rainbow Mode</button>
                <button class="mode" id="eraser-mode">Eraser Mode</button>
                <button class="mode" id="clear-mode">Clear Board</button>
                <style data="test" type="text/css"></style>
                <input type="range" min="1" max="64" value="16" class="slider">
            </div>
        </div>
    </body>
</html>
